<div class="page-content">
  <h2 class="page-title">Users</h2>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else if (users().length === 0) {
    <div class="empty-state">
      <mat-icon class="empty-icon">people</mat-icon>
      <p>No users found.</p>
    </div>
  } @else {
    <div class="table-wrapper">
      <table mat-table [dataSource]="users()" class="admin-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let user">{{ user.name }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email }}</td>
        </ng-container>

        <ng-container matColumnDef="phoneNumber">
          <th mat-header-cell *matHeaderCellDef>Phone</th>
          <td mat-cell *matCellDef="let user">{{ user.phoneNumber }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let user">
            <span class="role-badge" [class]="user.role === 'ADMIN' ? 'role-admin' : 'role-user'">
              {{ user.role }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Active</th>
          <td mat-cell *matCellDef="let user">
            <button mat-icon-button [color]="user.isActive ? 'primary' : 'warn'" (click)="toggleUserStatus(user)">
              <mat-icon>{{ user.isActive ? 'toggle_on' : 'toggle_off' }}</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="phoneVerified">
          <th mat-header-cell *matHeaderCellDef>Verified</th>
          <td mat-cell *matCellDef="let user">
            <mat-icon [color]="user.phoneVerified ? 'primary' : ''">
              {{ user.phoneVerified ? 'verified' : 'new_releases' }}
            </mat-icon>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  }
</div>
