server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:paisaads
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

jwt:
  secret: paisaads-super-secret-jwt-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

cors:
  allowed-origins: http://localhost:4200,http://localhost:3000
